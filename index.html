<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestao aluguel</title>
    <script src="https://kit.fontawesome.com/0f437c02b4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/estilos/style.css">
</head>

<body>
    <div class="conteiner-main">
        <header class="header-site">
            <i class="fa-solid fa-bars fa-2xl"></i>
            <h1>Gestão de aluguel</h1>
            <div>
                <i class="fa-regular fa-bell fa-2xl" style="color: rgb(255, 255, 255);"></i>
            </div>
        </header>
        <div class="conteudo-main">
            <aside class="nav-lateral">
                <ul class="lista-nav">
                    <li><i class="fa-solid fa-house fa-xl"></i></li>
                    <li><i class="fa-solid fa-chart-column fa-xl"></i></li>
                    <li><i class="fa-solid fa-wallet fa-xl"></i></li>
                    <li><i class="fa-solid fa-user-group fa-xl"></i></li>
                    <li><i class="fa-solid fa-gears fa-xl"></i></li>
                </ul>
            </aside>

            <main>
                <section class="header-main">
                    
                </section>

                <section class="conteudo-resumo">
                    
                    <ul class="lista-resumo">
                        <li class="card-resumo">
                            <i class="fa-solid fa-house fa-2xl"></i>
                            <div>
                                <h3>Total de casas</h3>
                                <span class="total">0</span>
                            </div>
                        </li>

                        <li class="card-resumo">
                            <i class="fa-solid fa-key fa-2xl"></i>
                            <div>
                                <h3>Casas alugadas</h3>
                                <span class="alugadas">0</span>
                            </div>
                        </li>

                        <li class="card-resumo">
                            <i class="fa-solid fa-door-open fa-2xl"></i>
                            <div>
                                <h3>Casas livres</h3>
                                <span class="livres">0</span>
                            </div>
                        </li>

                        <li class="card-resumo">
                            <i class="fa-solid fa-coins fa-2xl"></i>
                            <div>
                                <h3>Falta pagar</h3>
                                <span class="atrasadas">0</span>
                            </div>
                        </li>
                    </ul>
                </section>

                <section class="conteiner-casas">
                    <h2>Casas</h2>
                    <ul class="lista-casas">
                    <!--<li class="card-casa">
                            <div class="sec-head-card">
                                <i class="fa-solid fa-house-chimney fa-2xl"></i>
                                <span class="head-status">
                                    <p class="status-disp">Disponivel</p>
                                    <p class="status-pag">Pago</p>
                                </span>
                            </div>
                            <div class="sec-info-card">
                                <h4>Casa 01</h4>
                                <p>pessoa: joao</p>
                                <button class="info-det">Ver detalhes</button>
                                <button class="info-att">Atualizar info</button>
                            </div>
                        </li>-->
                        
                    </ul>
                    <button class="btn-add-casa"><i class="fa-solid fa-circle-plus" style="color: rgb(255, 255, 255);"></i>Adicionar casa</button>
                </section>
            </main>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>

</html>
