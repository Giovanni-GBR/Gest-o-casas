<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestao aluguel</title>
    <script src="https://kit.fontawesome.com/0f437c02b4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="estilos/style.css">
</head>

<body>
    <div class="conteiner-main">
        <header class="header-site">
            <i class="fa-solid fa-bars fa-2xl"></i>
            <h1>Gestão de aluguel</h1>
            <div>
                <i class="fa-regular fa-bell fa-2xl" style="color: rgb(255, 255, 255);"></i>
            </div>
        </header>
        <div class="conteudo-main">
            <aside class="nav-lateral">
                <ul class="lista-nav">
                    <li><i class="fa-solid fa-house fa-xl"></i></li>
                    <li><i class="fa-solid fa-chart-column fa-xl"></i></li>
                    <li><i class="fa-solid fa-wallet fa-xl"></i></li>
                    <li><i class="fa-solid fa-user-group fa-xl"></i></li>
                    <li><i class="fa-solid fa-gears fa-xl"></i></li>
                </ul>
            </aside>

            <main>
                <section class="header-main">

                </section>

                <section class="conteudo-resumo">

                    <ul class="lista-resumo">
                        <li class="card-resumo">
                            <i class="fa-solid fa-house fa-2xl"></i>
                            <div>
                                <h3>Total de casas</h3>
                                <span class="total">0</span>
                            </div>
                        </li>

                        <li class="card-resumo">
                            <i class="fa-solid fa-key fa-2xl"></i>
                            <div>
                                <h3>Casas alugadas</h3>
                                <span class="alugadas">0</span>
                            </div>
                        </li>

                        <li class="card-resumo">
                            <i class="fa-solid fa-door-open fa-2xl"></i>
                            <div>
                                <h3>Casas livres</h3>
                                <span class="livres">0</span>
                            </div>
                        </li>

                        <li class="card-resumo">
                            <i class="fa-solid fa-coins fa-2xl"></i>
                            <div>
                                <h3>Falta pagar</h3>
                                <span class="atrasadas">0</span>
                            </div>
                        </li>
                    </ul>
                </section>

                <section class="conteiner-casas">
                    <h2>Casas</h2>
                    <ul class="lista-casas">
                        <!--<li class="card-casa">
                            <div class="sec-head-card">
                                <i class="fa-solid fa-house-chimney fa-2xl"></i>
                                <span class="head-status">
                                    <p class="status-disp">Disponivel</p>
                                    <p class="status-pag">Pago</p>
                                </span>
                            </div>
                            <div class="sec-info-card">
                                <h4>Casa 01</h4>
                                <p>pessoa: joao</p>
                                <button class="info-det">Ver detalhes</button>
                                <button class="info-att">Atualizar info</button>
                            </div>
                        </li>-->

                    </ul>
                    <button class="btn-add-casa" onclick="addCasa()"><i class="fa-solid fa-circle-plus"
                            style="color: rgb(255, 255, 255);"></i>Adicionar casa</button>
                </section>
            </main>
            <div class="modal">
                <div class="conteudo-modal form-modal">
                    <header>
                        <i class="fa-solid fa-house fa-2xl icons pendente"></i>
                        <div>
                            <h1>Nova casa</h1>
                            <p>Preencha os dados</p>
                        </div>
                    </header>
                    <div class="form">
                        <label for="">Casa:</label>
                        <input type="text" placeholder="Ex: Casa 05" class="input-nome">
                        <label for="">Morador:</label>
                        <input type="text" placeholder="Ex: João" class="input-morador">
                        <label for="">Valor aluguel:</label>
                        <input type="number" placeholder="Ex: 500" class="input-valor">
                        <label for="">Pagamento:</label>
                        <select name="" id="statusCasa">
                            <option value="pago">Pago</option>
                            <option value="atrasado">Atrasado</option>
                            <option value="pendente">Pendente</option>
                        </select>
                        <label for="">Disponibilidade:</label>
                        <select name="" id="situacaoCasa">
                            <option value="Disponivel">Disponivel</option>
                            <option value="Oculpado">Oculpado</option>
                        </select>
                        <div>
                            <button onclick="criarCasa()">Salvar casa</button>
                            <button onclick="fecharModal()">Cancelar</button>
                        </div> 
                    </div>
                </div>
                <div class="conteudo-modal info-modal">
                    <header>
                        <i class="fa-solid fa-house fa-2xl icons pago"></i>
                        <div>
                            <h1 class="titulo-info">Casa 01</h1>
                            <p>Informaçoes</p>
                        </div>
                    </header>
                    <div>
                        <section class="info-cards">
                            <div class="info-morador-card card-info-detail">
                                <i class="fa-solid fa-user fa-2xl icons pendente"></i>
                                <span>
                                    <p>morador:</p>
                                    <p class="nome-morador">Giovanni</p>
                                </span>
                            </div>
                            <div class="card-info-detail">
                                <i class="fa-solid fa-dollar-sign fa-2xl icons pago"></i>
                                <span>
                                    <p>aluguel:</p>
                                    <p class="valor-aluguel">350</p>
                                </span>
                            </div>
                            <div class="card-info-detail">
                                <i class="fa-solid fa-calendar-days fa-2xl icons pendente"></i>
                                <span>
                                    <p>vencimento</p>
                                    <p class="dia-vencimento">dia 10</p>
                                </span>
                            </div>
                            <div class="card-info-detail">
                                <i class="fa-solid fa-door-open fa-2xl icons pago"></i>
                                <span>
                                    <p>situacão</p>
                                    <p class="situacao-info">Alugada</p>
                                </span>
                            </div>
                            <div class="card-info-detail">
                                <i class="fa-brands fa-cc-amazon-pay fa-2xl icons atrasado"></i>
                                <span>
                                    <p>status</p>
                                    <p class="status-info">pago</p>
                                </span>
                            </div>
                        </section>
                        <div class="btns-modal">
                            <button onclick="atualizarPagamento()">Atualizar pagamento</button>
                            <button onclick="fecharModal()">Fechar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
